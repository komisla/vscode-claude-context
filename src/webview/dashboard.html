<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Context Breakdown</title>
    <style>
      body {
        color: var(--vscode-foreground);
        background: var(--vscode-editor-background);
        font-family: var(--vscode-font-family);
        padding: 24px;
      }

      .muted {
        color: var(--vscode-descriptionForeground);
      }
    </style>
  </head>
  <body>
    <h1>Claude Context Breakdown</h1>
    <p id="status" class="muted">Waiting for context data.</p>
    <script>
      const status = document.getElementById('status');

      window.addEventListener('message', (event) => {
        if (event.data?.type !== 'contextBreakdown') {
          return;
        }

        const breakdown = event.data.payload;
        status.textContent =
          breakdown.totalTokens === 0 && breakdown.fillPercent === 0
            ? 'Claude Code session not found.'
            : `Context fill: ${Math.round(breakdown.fillPercent)}%`;
      });
    </script>
  </body>
</html>
